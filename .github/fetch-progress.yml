name: Fetch Membership Progress
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch CSV and convert to JSON
        run: |
          curl -sL "https://docs.google.com/spreadsheets/d/e/2PACX-1vT0elBqVsSriN0YfFDUGPyeg0HU6JuJsdeNxROUsuV4sBBa2Gl57U1rjOt_lFB6BNqPhMGZqJFAjOxi/pub?output=csv" | \
          awk -F',' 'NR==2{printf "{\"percentage\":%s,\"members\":%s}\n",$1,$2}' > progress.json
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add progress.json
          git diff --staged --quiet || git commit -m "Update membership progress"
          git push
